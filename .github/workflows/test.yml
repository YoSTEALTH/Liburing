---
name: Test

on: [push, pull_request]

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest]
                python-version:
                    ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15-dev"]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Zig
              uses: actions/setup-zig@v2
              with:
                  version: 0.15.2

            # Setup Python
            - uses: actions/checkout@v4
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  python3 -m pip install pytest pyoz
                  python3 -m pyoz build
                  pyhton3 -m pip install dist/*.whl

            - name: Test with PyTest
              run: |
                  python3 -m pytest test
